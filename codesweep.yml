check:
  - parallel:
      - bun lint
      - bun syncpack:lint
      - bun typecheck
      - bun spellcheck
      - bun fallow
      - bun test

fix:
  - sequential:
      - bun fix
      - bun syncpack:fix
  - parallel:
      - bun typecheck
      - bun spellcheck
      - bun fallow
      - bun test
